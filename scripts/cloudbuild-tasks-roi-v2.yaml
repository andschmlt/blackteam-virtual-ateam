# =============================================================================
# TASKS ROI ENGINE v2.0 - Cloud Build Configuration
# Master List v1.0 Compliant
# =============================================================================
# Author: W-FLUX (Felix Chang) - WhiteTeam Head of Tech
# Created: 2026-02-03
#
# Usage:
#   gcloud builds submit --config=cloudbuild-tasks-roi-v2.yaml .
# =============================================================================

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tasks-roi-engine-v2'
      - '-f'
      - 'Dockerfile.tasks-roi-v2'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tasks-roi-engine-v2'

  # Step 3: Deploy to Cloud Run Jobs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'tasks-roi-engine-v2'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tasks-roi-engine-v2'
      - '--region'
      - 'us-central1'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=paradisemedia-bi'
      - '--set-secrets'
      - 'CLICKUP_API_KEY=clickup-api-key:latest'
      - '--max-retries'
      - '1'
      - '--task-timeout'
      - '600s'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'

images:
  - 'gcr.io/$PROJECT_ID/tasks-roi-engine-v2'

options:
  logging: CLOUD_LOGGING_ONLY

tags:
  - 'tasks-roi'
  - 'v2'
  - 'master-list-compliant'
